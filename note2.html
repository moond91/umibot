<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실버인포롱폼 2기 - 2주차 공부노트</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Noto Sans KR',-apple-system,sans-serif;color:#1a1a2e;background:#fff}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.wrap{padding:16px;max-width:800px;margin:0 auto;min-height:100vh}
.hd{background:linear-gradient(135deg,#bae6fd 0%,#e0f2fe 25%,#fed7aa 65%,#fdba74 100%);border-radius:16px;padding:24px 20px;margin-bottom:16px;color:#1e293b}
.hd-sub{font-size:12px;color:#64748b;letter-spacing:2px;margin-bottom:4px;font-weight:600}
.hd h1{font-size:21px;font-weight:800;margin-bottom:2px;color:#1e293b}
.warn{font-size:10.5px;line-height:1.7;margin-top:10px;padding:10px 12px;background:#fff;border-radius:8px;border:1px solid #e5e7eb;color:#dc2626;font-weight:500}
.warn .bk{animation:blink 1.5s ease-in-out infinite;color:#1a1a1a;font-weight:800}
.prog-wrap{margin-top:14px}
.prog-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:#1e293b}

.ctrls{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.cb{padding:5px 13px;border-radius:20px;border:1.5px solid #d1d5db;background:#fff;color:#374151;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.cb.on{border:2px solid #e8590c;background:#e8590c;color:#fff}
.cat{margin-bottom:12px;border-radius:14px;overflow:hidden;border:1px solid #e2e8f0}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.ct{font-size:15px;font-weight:800}
.cd{font-size:11px;color:#64748b;margin-top:2px}
.ca{font-size:18px;color:#94a3b8;transition:transform .2s}
.ca.op{transform:rotate(180deg)}
.cb2{padding:0 10px 10px}
.it{display:flex;align-items:flex-start;gap:9px;padding:10px 6px;border-bottom:1px solid #f1f5f9;cursor:pointer}

.ck.dn{background:#22c55e;border-color:#22c55e}
.il{font-size:14px;font-weight:600;color:#1e293b}
.il.dn{text-decoration:line-through;color:#94a3b8}

.db{font-size:11px;color:#64748b;cursor:pointer;margin-top:3px;display:inline-block}
.db:hover{color:#e8590c}
.dx{margin:0 6px 10px 35px;padding:14px 16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;font-size:13px;line-height:1.75;color:#334155;white-space:pre-wrap;word-break:keep-all}
.sm{color:#ea580c;font-weight:700}
.ft{text-align:center;padding:16px 0 8px;font-size:12px;color:#9ca3af}

#pw-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Pretendard','Noto Sans KR',sans-serif}
#pw-screen .pw-box{text-align:center;padding:40px;max-width:340px;width:90%}
#pw-screen h2{font-size:20px;font-weight:800;color:#1F2937;margin-bottom:8px}
#pw-screen p{font-size:13px;color:#6B7280;margin-bottom:20px}
#pw-screen input{width:100%;padding:14px;font-size:18px;text-align:center;border:2px solid #D1D5DB;border-radius:12px;outline:none;font-family:inherit;letter-spacing:8px}
#pw-screen input:focus{border-color:#F97316}
#pw-screen button{margin-top:12px;width:100%;padding:14px;background:#F97316;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
#pw-screen .pw-err{color:#DC2626;font-size:12px;font-weight:700;margin-top:10px;display:none}
#pw-screen .pw-logo{font-size:40px;margin-bottom:16px}
.wrap{display:none}
</style>
</head>

<div id="pw-screen">
  <div class="pw-box">
    <div class="pw-logo">🔐</div>
    <h2>2주차 공부노트</h2>
    <p>수강생 전용 자료입니다<br>비밀번호를 입력해주세요</p>
    <input type="password" id="pw-input" maxlength="10" placeholder="••••" onkeyup="if(event.keyCode===13)checkPw()">
    <button onclick="checkPw()">확인</button>
    <div class="pw-err" id="pw-err">⚠️ 비밀번호가 틀렸습니다</div>
  </div>
</div>
<div class="wrap" id="app"></div>
<script>
const DATA = [
  {
    id: "c1",
    title: "🔥 마인드셋 & 필독사항",
    desc: "2기 장착 마인드 + 강의 수강 원칙",
    items: [
      {
        id: "1-1",
        label: "긍정적 확언 + 우직함의 마인드",
        priority: "필수",
        detail: `쌤: "난 된다, 다 된다, 할 수 있다, 해낸다. 이거 계속 수천 번씩 입에 계속 말해야 된다고 했잖아요."

"마음이 무너질 때마다 다시 한번 다짐해. 나는 할 수 있다."

"난 이거밖에 없다, 내가 어떤 사람인지 보여주겠다" — 이런 오기와 우직한 마인드를 장착하고 끝까지 밀어붙이는 것이 성공의 기본 원칙.

인생에는 '실패'가 없고 오직 '성공'과 '과정'만 존재한다. 실력이 안 느는 것 같은 평평한 구간을 견뎌야 비로소 한 번에 터지는 '임계점'을 맞이할 수 있다.`,
      },
      {
        id: "1-2",
        label: "시기·질투·비교·싸움 절대 금지",
        priority: "필수",
        detail: `쌤: "시기가 할 수 있지. 사람인데 질투도 할 수 있고, 비교도 할 수 있지."

"나는 저 사람을 끌어내릴 거야" 이런 거 말고, "나도 저렇게 될 수 있어. 나도 저것보다 더 잘될 수 있어." 이렇게 생각해서 목표로 삼으셔야 돼요.

쌤: "배움의 속도는 달라도 도착지는 같아요. 늦게 가도 되고 빨리 가도 되는데 어쨌든 우리는 그 도착지는 같아요."

"끌어주고, 밀어주고, 잡아주고, 으샤으샤 해주고, 안아주고 다 하는 거예요, 우리는."

💡 뾰족한 말이 나가겠다 싶으면 끝에 "용" 붙이세요.
쌤: "했어요용, 그랬어요용. 하지만 '디질래용?' 이런 건 안 되는 거예요."`,
      },
      {
        id: "1-3",
        label: "강의 최소 3번 돌려보기 + 필독 9가지",
        priority: "필수",
        detail: `쌤: "강의 한 번만 보고 절대 몰라요. 3번, 5번, 10번 들으세요. 안 들린 게 들려요."

"제 강의는 진짜 들으면 들을수록 새로운 게 나오고, 혼잣말로 꿀팁 중얼거리는 게 있어요. 그런 것도 들려요, 나중 되면."

"2강은 무조건 최소 3번 돌려보세요. 들을 때는 쉬운데 혼자 하려고 하면 '어? 뭐 해야 되지?' 해요."

[필독 9가지]
① 강의 최소 3번 5번 10번 들으세요
② 강의 들으면 다 나와있습니다. 안 듣고 묻지 마세요!
③ 조교님들, 매니저님께 감사 표현 많이 해주세요
④ 조교님들 말씀은 제 말입니다! 반드시 따라주세요
⑤ 동기들끼리 서로 끈끈하게 많이 알려주세요
⑥ 실버인포롱폼2기 핵심정리(우미봇) — 하루에 한번 꼭 들어가서 보세요!
⑦ 강의에 나온 내용들은 절대로 유포하시면 안 됩니다
⑧ 제 강의는 허위 푸는 강의가 아닙니다. 제 운영방식대로 가르치는 강의입니다
⑨ 제가 가르친 대로 하세요!

쌤: "조교님들 열 분이 무일푼으로 일하세요. 단지 저 하나 보고 도와주고 싶다고 해서 오신 분들이에요."`,
      },
      {
        id: "1-4",
        label: "첫 영상 반응 없어도 실망 금지",
        priority: "필수",
        detail: `쌤: "첫 영상으로 반응 없더라도 실망하지 마세요. 첫 영상이 잘 되는 건 모든 것이 100% 갖춰졌을 때 되는 거고, 그거는 정말 운의 영역이에요."

"없을 거다 생각하고 올리시는 거야. 알겠죠?"`,
      },
    ],
  },
  {
    id: "c2",
    title: "🎯 역사 썸네일 문구 5법칙",
    desc: "역사 채널 전용 클릭 유도 썸네일 공식",
    items: [
      {
        id: "2-1",
        label: "법칙 1: '누구' 법칙 — 인물 중심형",
        priority: "필수",
        detail: `쌤: "썸네일 문구 법칙 1. 누구 법칙. 인물 중심형이거든요. 되게 쉬워요, 유명한 사람 이름만 갖다 붙이면 돼요."

"여기에 '다된다윤' 있으면 사람들이 안 봐요. 근데 '영조', '정순왕후 이야기' 이런 거니까 보는 거거든요."

[구조] 인물명 + 한 줄 설명 (또는 반대)
→ 클릭 이유: "이 사람이 누군데?" — 유명인만 가능!

[한 줄 설명 4가지 유형]
① 숫자 대비 — "66세 영조와 결혼한 15세 소녀" → 극단적 차이
② 신분 반전 — "무수리에서 왕의 엄마" → 낮은→높은 신분
③ 직함·타이틀 — "조선 6대 왕" → 한 단어로 각인
④ 범위·스케일 — "1대 태조부터 27대 순종까지" → "전부 다" 기대감

쌤: "인물명이 썸네일에 있으면 시청자 머릿속에 '이 사람에 대해 알고 싶다'는 호기심이 바로 생깁니다."

⚠️ 패턴화 주의: 매번 같은 방식 금지! 숫자 대비, 신분 반전, 직함, 스케일을 번갈아 쓸 것`,
      },
      {
        id: "2-2",
        label: "법칙 2: '어떻게' 법칙 — 궁금증 유발형",
        priority: "필수",
        detail: `쌤: "'어떻게'를 넣었을 때 궁금증을 일으킨단 말이에요."

"'어떻게'는 인간의 뇌가 무시하기 어려운 질문이에요. 답을 모르면 불편해지고, 알고 싶어집니다."

[구조] 역사적 상황 + "어떻게 ○○했을까?"

[4가지 유형]
① 스케일 의외성 — "그 큰 궁궐을 어떻게 전부 난방했을까?"
② 신분·처지 의외성 — "폐위된 왕의 4살 딸 어떻게 살았을까?"
③ 숨겨진 뒷이야기 — "엄홍도와 후손은 어떻게 되었나!?"
④ 일상·생리적 호기심 — "조선시대 왕비는 똥을 어떻게 쌌을까?"

쌤: "특히 역사 콘텐츠는 '그 시대에 그걸 어떻게 했지?'라는 시대적 갭이 궁금증을 더 강하게 만들거든요."

💡 핵심: 앞에 오는 상황이 "그걸 어떻게?" 하고 의아해질 만큼 의외여야 함!

쌤: "'어떻게'만 붙인다고 다 되는 게 아니에요. 앞에 오는 상황이 의외여야 되는 거예요."

⚠️ 패턴화 주의: 매번 "~했을까?"로만 끝내지 말 것. "~되었나!?", "~한 이유" 등 다양하게!
→ 누구 법칙과 어떻게 법칙을 번갈아 사용할 것`,
      },
      {
        id: "2-3",
        label: "법칙 3: '왜' 법칙 — 이유 추적형",
        priority: "필수",
        detail: `쌤: "'왜' 법칙. 너무 궁금증 유발형이죠. '왜'라는 것 자체가 강력해요."

"인간은 이유를 모르는 상태를 본능적으로 불편해해요. 너무 궁금해 미치잖아요."

[구조] 의외의 역사적 사실 + "왜 ○○했을까?"

[4가지 유형]
① 논리적 모순 — "단종을 죽인 세조, 정순왕후를 왜 64년간 죽이지 않았을까?"
② 감정적 모순 — "그토록 사랑했던 여인을 버리고 숙종은 왜 끝까지 외면했나?"
③ 의외의 팩트 — "조선시대는 왜 40세도 채우지 못했을까?"
④ 현대 상식과의 모순 — "종기? 그냥 짜면 되는데 조선 왕들은 왜 죽었을까?"

쌤: "'어떻게'가 방법·과정에 대한 궁금증이라면 '왜'는 동기·이유에 대한 궁금증이에요."

쌤: "'왜'의 위력은 앞에 오는 사실이 얼마나 '말이 안 되는가'에 달려 있어요. 모순되는 상황이 있어야 '왜'가 더 극대화되는 거예요."

쌤: "여기서 '왜'를 빼면 하나도 재미없어요. '왜'가 들어가야 돼. '왜'가."

💡 활용 예시:
"이순신을 미워한 선조, 왜 다시 삼도수군통제사로 임명했을까?"
"이순신이 있는데 왜 일본을 정벌하지 못했을까?"

⚠️ 패턴화 주의:
쌤: "내 채널에 있는 거를 알고리즘이 딱 펼쳐봐요. 전부 '왜'다? 알았어. 양산형."
→ 누구/어떻게/왜 법칙을 번갈아 사용! '왜'가 항상 중간에만 오지 말고 시작/중간/마지막 다양하게!`,
      },
      {
        id: "2-4",
        label: "법칙 4: '질문' 법칙 — 실체 추적형",
        priority: "필수",
        detail: `쌤: "법칙 2는 '어떻게' 과정을 묻고, 법칙 3은 '왜' 이유를 묻는 거잖아요. 근데 이 법칙은 사실·정체 그 자체를 묻는 질문이에요."

"우리 알고 있다고 생각했지만 사실은 몰랐던 거, 숨겨진 정체·실체를 밝히는 구조거든요."

[구조] 익숙한 대상 + "진짜는 무엇인가?" 또는 "알고 있던 것이 틀렸다"

[4가지 유형]
① 일상적 궁금증 — "400년 전 조선 사람들은 뭘 먹고 살았을까?"
② 기존 상식 뒤집기 — "사극에 속았다! 영의정 실제는 바지사장?"
③ 숨겨진 사실 — "조선왕의 이름 뜻은 무엇일까?"
④ 정체 추적 — "엄홍도 그는 누구인가?"

쌤: "'사극에 속았다!'처럼 기존 상식을 정면으로 부정하면 시청자는 '그러면 진짜는 뭔데?'를 알기 전까지 영상을 끄지 못합니다."

⚠️ 패턴화 주의: 법칙 1~4를 번갈아 사용!`,
      },
      {
        id: "2-5",
        label: "법칙 5: '반전' 법칙 — 충격 사실형",
        priority: "필수",
        detail: `쌤: "법칙 4 '질문'은 시청자에게 '너 이거 몰랐지?'라고 묻는 거라면, 법칙 5 '반전'은 '너 이거 안다고 생각했지? 틀렸어'라고 단정하는 거예요."

"질문이 아니라 확언이기 때문에 더 강해요."

[구조] 익숙한 역사 상식 + 반전 키워드 ("진실", "비밀", "소름", "숨겨진", "충격적인")

var LOG_URL="https://script.google.com/macros/s/AKfycbzL6HZL-HmGnNYFZ1Wl9-f75vn4SlDzExiKXSPHcp39GosqDkOHyQrA5EDGuQDZEJK9/exec";

function getDevice(){
  var ua=navigator.userAgent;var device="알수없음";
  if(/iPhone/i.test(ua))device="iPhone";else if(/iPad/i.test(ua))device="iPad";
  else if(/Android/i.test(ua))device="Android";else if(/Mac/i.test(ua))device="Mac";
  else if(/Windows/i.test(ua))device="Windows";else if(/Linux/i.test(ua))device="Linux";
  var browser="";
  if(/Whale/i.test(ua))browser="Whale";else if(/Edg/i.test(ua))browser="Edge";
  else if(/Chrome/i.test(ua))browser="Chrome";else if(/Safari/i.test(ua))browser="Safari";
  else if(/Firefox/i.test(ua))browser="Firefox";
  return device+(browser?" / "+browser:"");
}
function getTimestamp(){
  var d=new Date();var pad=function(n){return n<10?"0"+n:n};
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+" "+pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
}
function sendLog(status,pw){
  try{fetch(LOG_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({timestamp:getTimestamp(),device:getDevice(),referrer:document.referrer||"direct",page:"공부노트 2주차",status:status,password:pw||""})
  })}catch(e){}
}
function checkPw(){
  var pw=document.getElementById("pw-input").value;
  if(pw==="0424"){
    document.getElementById("pw-screen").style.display="none";
    document.querySelector(".wrap").style.display="block";
    sendLog("성공","");render();
  }else{
    document.getElementById("pw-err").style.display="block";
    document.getElementById("pw-input").value="";
    document.getElementById("pw-input").style.borderColor="#DC2626";
    setTimeout(function(){document.getElementById("pw-input").style.borderColor="#D1D5DB"},1500);
    sendLog("실패",pw);
  }
}

var checks={},openCats={},openDetails={},filter="all";
DATA.forEach(function(c){openCats[c.id]=true});

function sv(){try{localStorage.setItem("n2c",JSON.stringify(checks))}catch(e){}}
function ld(){try{var s=localStorage.getItem("n2c");if(s){var d=JSON.parse(s);for(var k in d)checks[k]=d[k]}}catch(e){}}
ld();

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function render(){
  var ai=DATA.reduce(function(a,c){return a.concat(c.items)},[]);
  var total=ai.length,done=ai.filter(function(i){return checks[i.id]}).length;
  var pct=total>0?Math.round(done/total*100):0;
  var fd=DATA.map(function(c){
    var fi=filter==="all"?c.items:filter==="미완료"?c.items.filter(function(i){return !checks[i.id]}):c.items.filter(function(i){return checks[i.id]});
    return {id:c.id,title:c.title,desc:c.desc,items:fi}
  }).filter(function(c){return c.items.length>0});

  var h='<div class="hd"><div class="hd-sub">실버인포롱폼 2기</div><h1>2주차 공부노트</h1>';
  h+='<div class="warn">🚨 본 자료는 실버인포롱폼2기 수강생들을 위한 자료입니다. <span class="bk">모든 권리는 다된다윤 강사님과 제작자 우미1에게 있습니다.</span> 저작권법 보호를 받으며 무단 복제·공유·배포를 엄격히 금지합니다. 위반 행위가 확인될 경우 저작권법 제136조에 따라 <strong>형사 고소 및 민사상 손해배상 청구</strong>를 포함한 가능한 모든 법적 조치를 지체 없이 즉시 진행하며 모든 자료는 삭제처리됩니다.</div>';
  h+='<div class="prog-wrap"><div class="prog-top"><span>'+done+' / '+total+' 완료</span><span class="prog-pct">'+pct+'%</span></div>';
  h+='<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div></div>';

  h+='<div class="ctrls">';
  ["all","미완료","완료"].forEach(function(f){
    h+='<button class="cb'+(filter===f?' on':'')+'" data-f="'+f+'">'+(f==="all"?"전체":f)+'</button>';
  });
  h+='</div>';

  fd.forEach(function(c){
    var io=openCats[c.id];
    h+='<div class="cat"><div class="ch" data-cat="'+c.id+'"><div><div class="ct">'+c.title+'</div><div class="cd">'+c.desc+'</div></div><span class="ca'+(io?' op':'')+'">▼</span></div>';
    if(io){
      h+='<div class="cb2">';
      c.items.forEach(function(item){
        var ck=checks[item.id],dop=openDetails[item.id];
        h+='<div><div class="it" data-chk="'+item.id+'"><div class="ck'+(ck?' dn':'')+'">'+(ck?'✓':'')+'</div><div><span class="il'+(ck?' dn':'')+'">'+esc(item.label);
        if(item.priority)h+='<span class="bg">'+item.priority+'</span>';
        h+='</span><br><span class="db" data-dtl="'+item.id+'">📖 '+(dop?'접기':'상세보기')+'</span></div></div>';
        if(dop){
          h+='<div class="dx">';
          item.detail.split("\n").forEach(function(line){
            if(line.trimStart().indexOf("쌤")===0){h+='<span class="sm">'+esc(line)+'</span>\n'}
            else{h+=esc(line)+'\n'}
          });
          h+='</div>';
        }
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  });
  h+='<div class="ft">실버인포롱폼 2기 공부노트 · 제작자 우미1</div>';
  document.getElementById("app").innerHTML=h;
}

document.getElementById("app").addEventListener("click",function(e){
  var t=e.target,p=t.closest("[data-chk]"),c=t.closest("[data-cat]"),f=t.closest("[data-f]"),d=t.closest("[data-dtl]");
  if(d){e.stopPropagation();openDetails[d.dataset.dtl]=!openDetails[d.dataset.dtl];render();return}
  if(p){checks[p.dataset.chk]=!checks[p.dataset.chk];sv();render();return}
  if(c){openCats[c.dataset.cat]=!openCats[c.dataset.cat];render();return}
  if(f){filter=f.dataset.f;render();return}
});

</script>
